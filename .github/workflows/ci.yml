name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  NO_NETWORK_TESTS: "1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@just

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Check formatting
        run: just fmt-check

      - name: Run clippy
        run: just lint

  test:
    name: Test (${{ matrix.name }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            runner: ubuntu-latest
            install-deps: true
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            install-deps: true
          - name: macOS ARM64
            runner: macos-latest
            install-deps: false
          - name: macOS x86_64
            runner: macos-15-intel
            install-deps: false
          - name: Windows x86_64
            runner: windows-latest
            install-deps: false
          - name: Windows ARM64
            runner: windows-11-arm
            install-deps: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@just

      - name: Install system dependencies
        if: matrix.install-deps
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Build
        run: just build

      - name: Run tests
        run: just test
